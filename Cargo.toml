[workspace]
members = [
  "crates/tryckeri-arena",
  "crates/tryckeri-mdast",
  "crates/bench",
  "crates/tryckeri-hast",
  "crates/tryckeri-parser",
  "crates/tryckeri-napi-binding",
  "crates/tryckeri-plugin-api",
  "crates/tryckeri-mdxjs-rs",
  "crates/tryckeri-pulldown-cmark",
  "crates/tryckeri",
]
resolver = "2"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = "symbols"
debug = false
panic = "abort"

[profile.profiling]
inherits = "release"
strip = false
debug = true
panic = "unwind"

[workspace.dependencies]
oxc_allocator = "0.121.0"
oxc_ast = "0.121.0"
oxc_codegen = "0.121.0"
oxc_estree = "0.121.0"
oxc_parser = "0.121.0"
oxc_span = "0.121.0"
oxc_syntax = "0.121.0"

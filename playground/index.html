<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sätteri Playground</title>
    <link rel="stylesheet" href="/src/prin.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <h2>Sätteri Playground</h2>

        <fieldset>
          <legend>Mode</legend>
          <label>
            <input type="radio" name="mode" value="markdown" checked />
            Markdown
          </label>
          <label>
            <input type="radio" name="mode" value="mdx" />
            MDX
          </label>
        </fieldset>

        <fieldset id="features-fieldset">
          <legend>Features</legend>
          <label><input type="checkbox" id="feat-gfm" checked /> GFM</label>
          <label><input type="checkbox" id="feat-frontmatter" checked /> Frontmatter</label>
          <label><input type="checkbox" id="feat-math" checked /> Math</label>
          <label
            ><input type="checkbox" id="feat-heading-attributes" checked /> Heading
            attributes</label
          >
          <label><input type="checkbox" id="feat-directive" /> Directive</label>
          <label><input type="checkbox" id="feat-superscript" /> Superscript</label>
          <label><input type="checkbox" id="feat-subscript" /> Subscript</label>
          <label><input type="checkbox" id="feat-wikilinks" /> Wikilinks</label>
          <label><input type="checkbox" id="feat-smart-punctuation" /> Smart punctuation</label>
          <fieldset
            id="smart-punct-options"
            class="hidden"
            style="margin-left: 1.5em; border: none; padding: 0"
          >
            <label><input type="checkbox" id="feat-smart-quotes" checked /> Quotes</label>
            <label><input type="checkbox" id="feat-smart-dashes" checked /> Dashes</label>
            <label><input type="checkbox" id="feat-smart-ellipses" checked /> Ellipses</label>
          </fieldset>
        </fieldset>

        <fieldset id="mdx-options-fieldset" class="hidden">
          <legend>MDX Options</legend>
          <label>
            jsxImportSource
            <input type="text" id="mdx-jsx-import-source" value="" placeholder="react (default)" />
          </label>
          <label>
            jsxRuntime
            <select id="mdx-jsx-runtime">
              <option value="automatic" selected>automatic</option>
              <option value="classic">classic</option>
            </select>
          </label>
          <label>
            <input type="checkbox" id="mdx-jsx" />
            jsx (keep JSX)
          </label>
          <label>
            <input type="checkbox" id="mdx-development" />
            development
          </label>
          <label>
            providerImportSource
            <input type="text" id="mdx-provider-import-source" value="" placeholder="none" />
          </label>
          <label>
            outputFormat
            <select id="mdx-output-format">
              <option value="program" selected>program</option>
              <option value="function-body">function-body</option>
            </select>
          </label>
        </fieldset>

        <fieldset id="optimize-static-fieldset">
          <legend>optimizeStatic</legend>
          <label>
            <input type="checkbox" id="optimize-static-toggle" />
            Enable
          </label>
          <div id="optimize-static-fields" class="hidden">
            <label>
              component
              <input type="text" id="os-component" value="Fragment" />
            </label>
            <label>
              prop
              <input type="text" id="os-prop" value="set:html" />
            </label>
            <label>
              <input type="checkbox" id="os-wrap-prop-value" />
              wrapPropValue
            </label>
            <label>
              ignoreElements
              <input type="text" id="os-ignore-elements" placeholder="comma-separated" />
            </label>
          </div>
        </fieldset>
        <a id="github-link" href="https://github.com/bruits/satteri" target="_blank" rel="noopener">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 32 32">
            <path
              fill="currentColor"
              d="M16 .396c-8.839 0-16 7.167-16 16c0 7.073 4.584 13.068 10.937 15.183c.803.151 1.093-.344 1.093-.772c0-.38-.009-1.385-.015-2.719c-4.453.964-5.391-2.151-5.391-2.151c-.729-1.844-1.781-2.339-1.781-2.339c-1.448-.989.115-.968.115-.968c1.604.109 2.448 1.645 2.448 1.645c1.427 2.448 3.744 1.74 4.661 1.328c.14-1.031.557-1.74 1.011-2.135c-3.552-.401-7.287-1.776-7.287-7.907c0-1.751.62-3.177 1.645-4.297c-.177-.401-.719-2.031.141-4.235c0 0 1.339-.427 4.4 1.641a15.4 15.4 0 0 1 4-.541c1.36.009 2.719.187 4 .541c3.043-2.068 4.381-1.641 4.381-1.641c.859 2.204.317 3.833.161 4.235c1.015 1.12 1.635 2.547 1.635 4.297c0 6.145-3.74 7.5-7.296 7.891c.556.479 1.077 1.464 1.077 2.959c0 2.14-.02 3.864-.02 4.385c0 .416.28.916 1.104.755c6.4-2.093 10.979-8.093 10.979-15.156c0-8.833-7.161-16-16-16z"
            />
          </svg>
          GitHub
        </a>
      </aside>

      <main id="editor-panel">
        <nav id="input-tabs">
          <button class="tab active" data-input-tab="source">Source</button>
          <button class="tab" data-input-tab="mdast-plugin">mdast plugin</button>
          <button class="tab" data-input-tab="hast-plugin">hast plugin</button>
        </nav>
        <div id="input-content">
          <div class="input-pane active" data-input-pane="source">
            <pre class="input-highlight" id="highlight-source"><code></code></pre>
            <textarea id="input" spellcheck="false">
# Hello World

This is a **Markdown** playground for Sätteri.

- Item 1
- Item 2
- Item 3

```js
console.log("hello");
```</textarea
            >
          </div>
          <div class="input-pane" data-input-pane="mdast-plugin">
            <pre class="input-highlight" id="highlight-mdast-plugin"><code></code></pre>
            <textarea id="input-mdast-plugin" spellcheck="false">
export default [
  {
    name: "my-plugin",
    // heading(node, ctx) {
    //   ...
    // },
  },
]</textarea
            >
          </div>
          <div class="input-pane" data-input-pane="hast-plugin">
            <pre class="input-highlight" id="highlight-hast-plugin"><code></code></pre>
            <textarea id="input-hast-plugin" spellcheck="false">
export default [
  {
    name: "my-plugin",
    // element: {
    //   filter: ["h1"],
    //   visit(node, ctx) {
    //     ...
    //   },
    // },
  },
]</textarea
            >
          </div>
        </div>
      </main>

      <section id="output-panel">
        <nav id="output-tabs">
          <button class="tab active" data-tab="mdast">mdast</button>
          <button class="tab" data-tab="hast">hast</button>
          <button class="tab" data-tab="output">HTML</button>
          <button class="tab" data-tab="rendered">Rendered</button>
        </nav>
        <div id="output-content">
          <pre id="tab-mdast" class="tab-pane active"></pre>
          <pre id="tab-hast" class="tab-pane"></pre>
          <pre id="tab-output" class="tab-pane"></pre>
          <div id="tab-rendered" class="tab-pane">
            <iframe id="rendered-frame" sandbox="allow-same-origin"></iframe>
          </div>
        </div>
        <div id="status-bar"></div>
      </section>
    </div>

    <div id="loading-overlay">
      <p>Loading WASM&hellip;</p>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

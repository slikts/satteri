name: CodSpeed

on:
  push:
    branches:
      - main
    paths:
      - "crates/**"
      - "packages/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pnpm-lock.yaml"
      - ".github/workflows/benchmark.yml"
  pull_request:
    paths:
      - "crates/**"
      - "packages/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pnpm-lock.yaml"
      - ".github/workflows/benchmark.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-benchmarks:
    name: Rust benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain, cache and cargo-codspeed
        uses: moonrepo/setup-rust@v1
        with:
          cache-target: release
          bins: cargo-codspeed

      - name: Build the benchmark target(s)
        run: cargo codspeed build -p satteri-bench

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run -p satteri-bench

  js-benchmarks:
    name: JS benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: moonrepo/setup-rust@v1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Pinned to 24 because codspeed doesn't seem to work on 26
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build NAPI binding
        run: pnpm run build:native
        working-directory: packages/satteri

      - name: Build TypeScript
        run: pnpm run build:ts
        working-directory: packages/satteri

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: pnpm run bench
          working-directory: packages/satteri

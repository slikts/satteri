name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # -- macOS --
          - host: macos-latest
            target: x86_64-apple-darwin
            build: pnpm run build:binary:native --target x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
            build: pnpm run build:binary:native --target aarch64-apple-darwin

          # -- Windows --
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: pnpm run build:binary:native --target x86_64-pc-windows-msvc

          # -- Linux GNU --
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: pnpm run build:binary:native --target x86_64-unknown-linux-gnu

          # -- WASM --
          - host: ubuntu-latest
            target: wasm32-wasip1-threads
            build: pnpm run build:binary:wasm

    name: Build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    defaults:
      run:
        working-directory: packages/satteri
    env:
      APP_NAME: satteri_napi
    steps:
      - name: Enable long paths on Windows
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true
        working-directory: ${{ runner.temp }}

      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: pnpm

      - name: Install Rust
        uses: moonrepo/setup-rust@v1
        with:
          targets: ${{ matrix.settings.target }}
          cache-target: release
          cache-extra-identifier: ${{ matrix.settings.target }}-${{ matrix.settings.host }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install
        working-directory: .

      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        if: matrix.settings.target != 'wasm32-wasip1-threads'
        with:
          name: bindings-${{ matrix.settings.target }}
          path: packages/satteri/${{ env.APP_NAME }}.*.node
          if-no-files-found: error

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        if: matrix.settings.target == 'wasm32-wasip1-threads'
        with:
          name: bindings-${{ matrix.settings.target }}
          path: packages/satteri/${{ env.APP_NAME }}.*.wasm
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: packages/satteri/artifacts

      - name: Build TypeScript for all packages
        run: pnpm --filter "./packages/*" run build:ts

      - name: Prepare NAPI artifacts
        run: pnpm napi create-npm-dirs && pnpm napi artifacts
        working-directory: packages/satteri

      - name: Check if release PR merge
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "commit_message=$COMMIT_MSG"
          if echo "$COMMIT_MSG" | grep -qE "^Release \(main\) \(#[0-9]+\)$"; then
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish NAPI platform packages
        if: steps.check.outputs.is_release == 'true'
        run: |
          pnpm napi version
          for dir in ./npm/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Publishing $(basename "$dir")..."
              npm publish "$dir" --access public --provenance || echo "Skipped (may already exist)"
            fi
          done
        working-directory: packages/satteri
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Inject optionalDependencies into main package.json
        if: steps.check.outputs.is_release == 'true'
        run: pnpm napi pre-publish -t npm --skip-optional-publish --no-gh-release
        working-directory: packages/satteri

      - uses: bruits/sampo/crates/sampo-github-action@f7241754458e1be4073902b2860596340c7d089c # sampo-v0.17.4
        with:
          command: auto
          cargo-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          npm-args: --access public --provenance --no-git-checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
